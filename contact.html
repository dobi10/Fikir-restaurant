<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Fikir Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f8f5f0;
color:#333;
}

header{
background:#8B0000;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:700px;
margin:50px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
text-align:center;
color:#8B0000;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
font-weight:600;
}

input,textarea{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
height:140px;
resize:vertical;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#8B0000;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#FFD700;
color:black;
}

.info{
margin-top:30px;
text-align:center;
line-height:2;
}

footer{
background:#8B0000;
color:white;
text-align:center;
padding:30px;
margin-top:50px;
}

</style>
</head>

<body>

<header>
<h1>Contact Us</h1>
</header>

<div class="container">

<h2>Send Us a Message</h2>

<form>

<label>Your Name</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Message</label>
<textarea required></textarea>

<button type="submit">Send Message</button>

</form>

<div class="info">

<p><strong>📍 Address:</strong> Addis Ababa</p>

<p><strong>📧 Email:</strong> fikir@example.com</p>

<p><strong>📞 Phone:</strong> Not Available</p>

</div>

</div>

<footer>

<p>© 2026 Fikir Restaurant. All Rights Reserved.</p>

</footer>

</body>
  </html>
