<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;}
header{background:#8B0000;color:white;text-align:center;padding:20px;}
.container{max-width:900px;margin:20px auto;}
.card{background:white;padding:15px;margin:10px;border-radius:10px;}
button{margin-right:10px;padding:8px;border:none;cursor:pointer;}
.del{background:red;color:white;}
.done{background:green;color:white;}
</style>
</head>

<body>

<header>
<h1>Restaurant Admin Panel</h1>
</header>

<div class="container" id="list">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
doc,
deleteDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD6G6wHeyMKvtPDU-3wOtvlB6C_VckkFPg",
authDomain: "fikir-2242a.firebaseapp.com",
projectId: "fikir-2242a",
storageBucket: "fikir-2242a.firebasestorage.app",
messagingSenderId: "1052796260139",
appId: "1:1052796260139:web:3e2c987cc237fc9941ff6e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

function load(){

onSnapshot(collection(db,"reservations"),(snap)=>{

list.innerHTML="";

snap.forEach(d=>{
const r = d.data();

list.innerHTML += `
<div class="card">
<p><b>Name:</b> ${r.name}</p>
<p><b>Email:</b> ${r.email}</p>
<p><b>Date:</b> ${r.date}</p>
<p><b>Status:</b> ${r.status || "Pending"}</p>

<button class="done" onclick="done('${d.id}')">Done</button>
<button class="del" onclick="remove('${d.id}')">Delete</button>
</div>
`;
});

});

}

window.done = async function(id){
await updateDoc(doc(db,"reservations",id),{
status:"Done"
});
}

window.remove = async function(id){
await deleteDoc(doc(db,"reservations",id));
}

load();

</script>

</body>
</html>
