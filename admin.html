<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>
body{font-family:Arial;background:#eee;margin:0;}
header{background:#8B0000;color:white;text-align:center;padding:20px;}
.container{max-width:800px;margin:30px auto;}
.card{background:white;margin:10px 0;padding:15px;border-radius:10px;}
</style>
</head>

<body>

<header>
<h1>Admin Dashboard</h1>
</header>

<div class="container" id="list">
Loading...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD6G6wHeyMKvtPDU-3wOtvlB6C_VckkFPg",
authDomain: "fikir-2242a.firebaseapp.com",
projectId: "fikir-2242a",
storageBucket: "fikir-2242a.firebasestorage.app",
messagingSenderId: "1052796260139",
appId: "1:1052796260139:web:3e2c987cc237fc9941ff6e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

async function load(){
const snap = await getDocs(collection(db,"reservations"));

list.innerHTML="";

snap.forEach(doc=>{
const r = doc.data();

list.innerHTML += `
<div class="card">
<p><b>Name:</b> ${r.name}</p>
<p><b>Email:</b> ${r.email}</p>
<p><b>Date:</b> ${r.date}</p>
<p><b>Time:</b> ${r.time}</p>
<p><b>Guests:</b> ${r.guests}</p>
<p><b>Status:</b> ${r.status}</p>
</div>
`;
});
}

load();

</script>

</body>
</html>
