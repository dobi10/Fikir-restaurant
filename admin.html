<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fikir Restaurant Admin</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#8B0000;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1000px;
margin:30px auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

button{
padding:10px 20px;
background:#8B0000;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#FFD700;
color:black;
}

</style>

</head>

<body>

<header>

<h1>Fikir Restaurant Admin Dashboard</h1>

</header>

<div class="container">

<div class="card">

<h2>Reservations</h2>

<p>All customer reservations will appear here after Firebase is connected.</p>

<button>Refresh</button>

</div>

<div class="card">

<h2>Restaurant Information</h2>

<p><strong>Restaurant:</strong> Fikir Restaurant</p>

<p><strong>Location:</strong> Addis Ababa</p>

<p><strong>Email:</strong> fikir@example.com</p>

</div>

</div>

</body>
</html>
