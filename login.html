<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
font-family:Arial;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:25px;
width:300px;
border-radius:10px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#8B0000;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#FFD700;
color:black;
}
</style>
</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyD6G6wHeyMKvtPDU-3wOtvlB6C_VckkFPg",
authDomain: "fikir-2242a.firebaseapp.com",
projectId: "fikir-2242a",
storageBucket: "fikir-2242a.firebasestorage.app",
messagingSenderId: "1052796260139",
appId: "1:1052796260139:web:3e2c987cc237fc9941ff6e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
window.location.href="admin.html";
})
.catch(()=>{
document.getElementById("msg").innerText="Login failed";
});

}

</script>

</body>
</html>
