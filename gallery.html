<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Fikir Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f8f5f0;
}

header{
background:#8B0000;
color:white;
padding:20px;
text-align:center;
}

h2{
text-align:center;
margin:40px 0;
color:#8B0000;
}

.gallery{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:.3s;
}

.gallery img:hover{
transform:scale(1.04);
}

footer{
margin-top:40px;
background:#8B0000;
color:white;
text-align:center;
padding:30px;
}

</style>

</head>

<body>

<header>

<h1>Food Gallery</h1>

</header>

<h2>Our Delicious Dishes</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=900&q=80">

<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=900&q=80">

<img src="https://images.unsplash.com/photo-1467003909585-2f8a72700288?auto=format&fit=crop&w=900&q=80">

<img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=900&q=80">

</div>

<footer>

</html>
